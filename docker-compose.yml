version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# upnews-pipeline  –  Docker Compose
#
# Usage — pass the right env file for your target environment:
#
#   Local (fast, rules-based, DEBUG logging):
#     docker compose --env-file .env.local up --build
#     docker compose --env-file .env.local run --rm pipeline   # run once
#
#   Dev:
#     docker compose --env-file .env.dev up --build
#
#   PR / Staging:
#     docker compose --env-file .env.pr up --build
#
#   QA:
#     docker compose --env-file .env.qa up --build
#
#   Production:
#     docker compose --env-file .env.prod up --build -d
#
# Or use the Makefile shortcuts:
#   make local | make dev | make pr | make qa | make prod
#
# Inspect the database after a run:
#   sqlite3 data/articles.db "SELECT title, uplifting_score FROM articles LIMIT 10;"
# ─────────────────────────────────────────────────────────────────────────────

services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: upnews-pipeline:${ENV:-local}
    container_name: upnews-pipeline

    # ── Environment ──────────────────────────────────────────────────────────
    # Variables are sourced from whichever --env-file you pass on the CLI.
    # Defaults here are safe for local use with no env file.
    environment:
      # Paths are absolute inside the container
      DATABASE_PATH: /app/data/upnews.db
      # Rule-based classifier requires no ML model download.
      # Change to 'setfit' and mount a trained model to use the ML path.
      CLASSIFIER_MODE: ${CLASSIFIER_MODE:-rules}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ARTICLES_LIMIT_PER_SOURCE: ${ARTICLES_LIMIT_PER_SOURCE:-50}
      CLASSIFICATION_THRESHOLD: ${CLASSIFICATION_THRESHOLD:-0.75}
      THUMBNAIL_CONCURRENCY: ${THUMBNAIL_CONCURRENCY:-10}
      THUMBNAIL_TIMEOUT: ${THUMBNAIL_TIMEOUT:-5}
      SUMMARIZATION_METHOD: ${SUMMARIZATION_METHOD:-distilbart}
      CATEGORIZATION_METHOD: ${CATEGORIZATION_METHOD:-zero-shot}
      THUMBNAIL_CACHE_ENABLED: ${THUMBNAIL_CACHE_ENABLED:-true}
      CRAWLER_TIMEOUT: ${CRAWLER_TIMEOUT:-10}
      CRAWLER_RETRIES: ${CRAWLER_RETRIES:-2}
      # HuggingFace cache (DistilBART, BART-MNLI) — persisted via volume
      TRANSFORMERS_CACHE: /app/models/hf_cache
      HF_HOME: /app/models/hf_cache

    # ── Volumes ───────────────────────────────────────────────────────────────
    volumes:
      # SQLite database — stored in the named volume  upnews-data  so that
      # upnews-api can mount the same volume and read pipeline-written articles.
      - upnews-data:/app/data
      # Structured JSON logs
      - ./logs:/app/logs
      # ML model weights (HuggingFace cache + optional SetFit model)
      # Pre-populate ./models/setfit_uplifting_model/ to enable CLASSIFIER_MODE=setfit
      - ./models:/app/models

    # ── Restart policy ────────────────────────────────────────────────────────
    # "no" means run once and stop (suitable for a cron/scheduler wrapper).
    # Change to "always" or "on-failure" to keep retrying.
    restart: "no"


# ── Named volume shared with upnews-api ──────────────────────────────────────
# Both repos declare the same volume name; Docker reuses it across projects.
# End-to-end workflow:
#   1. cd upnews-pipeline && make local   (populates upnews-data)
#   2. cd upnews-api      && make local   (reads from upnews-data)
volumes:
  upnews-data:
    name: upnews-data
